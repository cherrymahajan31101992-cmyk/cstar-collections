<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLLECTIONS | CSTAR TIMEPIECES</title>
    <style>
        :root { --gold: #d4af37; --black: #050505; --gray: #121212; --white: #ffffff; }
        body { background: var(--black); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; scroll-behavior: smooth; }
        
        header { background: rgba(0,0,0,0.98); border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; padding: 15px 0; text-align: center;}
        .back-btn { position: absolute; left: 20px; top: 25px; color: var(--gold); text-decoration: none; font-size: 12px; border: 1px solid var(--gold); padding: 5px 10px; border-radius: 5px; }
        .logo { color: var(--gold); font-size: 1.8rem; font-weight: 800; letter-spacing: 5px; text-transform: uppercase; margin: 0; }
        
        nav { display: flex; justify-content: center; gap: 20px; background: #000; padding: 12px 0; border-bottom: 1px solid #222; }
        nav a { color: #888; text-decoration: none; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; transition: 0.3s; }
        nav a:hover { color: var(--gold); }

        section { padding: 60px 5%; max-width: 1440px; margin: auto; }
        .section-title { text-align: center; margin-bottom: 40px; }
        .section-title h2 { color: var(--gold); font-size: 2.2rem; letter-spacing: 6px; text-transform: uppercase; border-bottom: 2px solid var(--gold); display: inline-block; padding-bottom: 10px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--gray); border-radius: 15px; border: 1px solid #222; overflow: hidden; transition: 0.5s; text-align: center; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--gold); transform: translateY(-10px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2); }
        .card img { width: 100%; height: 400px; object-fit: cover; background: #1a1a1a; }
        
        .info { padding: 25px; flex-grow: 1; }
        .series { color: var(--gold); font-size: 0.8rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        .name { color: #fff; font-size: 1.1rem; font-weight: bold; margin: 10px 0; }
        .price { font-size: 1.7rem; color: #fff; font-weight: 800; margin-bottom: 20px; }
        .buy-btn { display: block; background: #25D366; color: white; text-align: center; padding: 15px; text-decoration: none; border-radius: 10px; font-weight: bold; }

        footer { text-align: center; padding: 60px; color: #444; border-top: 1px solid #222; margin-top: 50px; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">← HOME</a>
    <div class="logo">CSTAR TIMEPIECES</div>
    <nav>
        <a href="#mens">Men's Premium</a>
        <a href="#women">Women's Elite</a>
        <a href="#footwear">Footwear</a>
    </nav>
</header>

<section id="mens">
    <div class="section-title"><h2>Men's Premium</h2></div>
    <div class="grid" id="mens-grid"></div>
</section>

<section id="women">
    <div class="section-title"><h2>Women's Elite</h2></div>
    <div class="grid" id="women-grid"></div>
</section>

<section id="footwear">
    <div class="section-title"><h2>Footwear Collection</h2></div>
    <div class="grid" id="footwear-grid"></div>
</section>

<script>
    // 1. MEN'S DATA (Full 15)
    const mensData = [
        { id: 1, name: "CS-M01 Aero", price: "2,999", series: "AERO SERIES" },
        { id: 2, name: "CS-M02 Stealth", price: "2,450", series: "STEALTH" },
        { id: 3, name: "CS-M03 Neon", price: "2,450", series: "NEON LINE" },
        { id: 4, name: "CS-M04 Ceramic", price: "3,490", series: "CERAMIC" },
        { id: 5, name: "CS-M05 Pearl", price: "3,490", series: "PURE WHITE" },
        { id: 6, name: "CS-M06 Dual", price: "4,400", series: "TWO-TONE" },
        { id: 7, name: "CS-M07 Grand", price: "4,850", series: "GT LUXE" },
        { id: 8, name: "CS-M08 Bone", price: "3,200", series: "SKELETON" },
        { id: 9, name: "CS-M09 Diver", price: "4,500", series: "DIVER PRO" },
        { id: 10, name: "CS-M10 Gold", price: "3,895", series: "CLASSIC" },
        { id: 11, name: "CS-M11 Slim", price: "2,999", series: "ELITE" },
        { id: 12, name: "CS-M12 Royal", price: "3,890", series: "ROYAL" },
        { id: 13, name: "CS-M13 Chrono", price: "2,800", series: "CHRONO master" },
        { id: 14, name: "CS-M14 Antique", price: "4,900", series: "VINTAGE" },
        { id: 15, name: "CS-M15 Phantom", price: "4,740", series: "PHANTOM" }
    ];

    // 2. WOMEN'S DATA (Full 30)
    const womenData = [];
    for(let i=1; i<=30; i++) {
        womenData.push({ id: i, name: "CS-Luxe Model " + (300+i), price: (2500 + (i*30)).toLocaleString(), series: "Elite Women" });
    }

    // 3. FOOTWEAR DATA (Crocs)
    const footwearData = [
        { id: 1, name: "Classic Comfort Clog", price: "1,850", series: "Imported Footwear" },
        { id: 2, name: "Sport All-Terrain Clog", price: "2,200", series: "Imported Footwear" },
        { id: 3, name: "Marble Edition Clog", price: "2,450", series: "Imported Footwear" },
        { id: 4, name: "Luxe Platform Clog", price: "2,600", series: "Imported Footwear" }
    ];

    // UNIVERSAL LOADER
    function loadGrid(data, containerId, prefix, hasSpace) {
        const grid = document.getElementById(containerId);
        data.forEach(item => {
            const imgPath = hasSpace ? `${prefix} (${item.id}).jpg` : `${prefix}(${item.id}).jpg`;
            grid.innerHTML += `
                <div class="card">
                    <img src="${imgPath}" alt="${item.name}" onerror="this.src='placeholder.jpg'">
                    <div class="info">
                        <p class="series">${item.series}</p>
                        <h3 class="name">${item.name}</h3>
                        <div class="price">₹${item.price}</div>
                        <a href="payment.html" class="buy-btn">PAY SECURELY</a>
                    </div>
                </div>`;
        });
    }

    // Initialize all 3 sections
    loadGrid(mensData, 'mens-grid', 'watch1-jpg', true);    // Men: Space before bracket
    loadGrid(womenData, 'women-grid', 'new-women', false);  // Women: No space
    loadGrid(footwearData, 'footwear-grid', 'crocs', false); // Crocs: No space
</script>

<footer>&copy; 2026 CSTAR COLLECTIONS | QUALITY SINCE 2014</footer>
</body>
</html>
