<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMEPIECES | CSTAR COLLECTIONS</title>
    <style>
        :root { --gold: #d4af37; --black: #050505; --gray: #121212; --white: #ffffff; }
        body { background: var(--black); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; scroll-behavior: smooth; }
        
        /* --- PREMIUM HEADER --- */
        header { background: rgba(0,0,0,0.98); border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; padding: 15px 0; }
        .logo-wrapper { text-align: center; margin-bottom: 15px; }
        .back-btn { position: absolute; left: 20px; top: 25px; color: var(--gold); text-decoration: none; font-size: 12px; border: 1px solid var(--gold); padding: 5px 10px; border-radius: 5px; }
        
        /* --- SUB-NAV FOR WATCHES --- */
        nav { display: flex; justify-content: center; gap: 25px; background: #000; padding: 10px 0; border-bottom: 1px solid #222; }
        nav a { color: #888; text-decoration: none; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        nav a:hover { color: var(--gold); }

        /* --- PRODUCT GRID SYSTEM --- */
        section { padding: 60px 5%; max-width: 1400px; margin: auto; }
        .section-title { text-align: center; margin-bottom: 40px; }
        .section-title h2 { color: var(--gold); font-size: 2rem; letter-spacing: 5px; text-transform: uppercase; border-bottom: 2px solid var(--gold); display: inline-block; padding-bottom: 10px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--gray); border-radius: 15px; border: 1px solid #222; overflow: hidden; transition: 0.5s; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--gold); transform: translateY(-10px); }
        .card img { width: 100%; height: 380px; object-fit: cover; background: #1a1a1a; }
        
        .info { padding: 20px; text-align: center; flex-grow: 1; }
        .series { color: var(--gold); font-size: 0.8rem; letter-spacing: 2px; font-weight: bold; text-transform: uppercase; }
        .name { color: #fff; font-size: 1rem; font-weight: bold; margin: 10px 0; min-height: 40px; }
        .price { font-size: 1.5rem; color: #fff; font-weight: 800; margin-bottom: 15px; }
        
        .buy-btn { display: block; background: #25D366; color: white; text-align: center; padding: 14px; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .buy-btn:hover { background: #128C7E; }

        /* --- FLOATING WHATSAPP --- */
        .support-btn { position: fixed; bottom: 30px; right: 30px; background: #25D366; width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        footer { text-align: center; padding: 40px; color: #444; border-top: 1px solid #222; margin-top: 50px; font-size: 12px; }
    </style>
</head>
<body>

<header>
