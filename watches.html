    // 1. FULL DATA FOR 15 MEN'S WATCHES
    const mensData = [
        { id: 1, name: "CS-M01 Aero Sport", price: "2,999", series: "AERO SERIES" },
        { id: 2, name: "CS-M02 Stealth Matte", price: "2,450", series: "STEALTH" },
        { id: 3, name: "CS-M03 Neon Cyber", price: "2,450", series: "NEON LINE" },
        { id: 4, name: "CS-M04 Black Ceramic", price: "3,490", series: "CERAMIC" },
        { id: 5, name: "CS-M05 Pearl Arctic", price: "3,490", series: "PURE WHITE" },
        { id: 6, name: "CS-M06 Dual Horizon", price: "4,400", series: "TWO-TONE" },
        { id: 7, name: "CS-M07 Grand Tourer", price: "4,850", series: "GT LUXE" },
        { id: 8, name: "CS-M08 Bone Skeleton", price: "3,200", series: "SKELETON" },
        { id: 9, name: "CS-M09 Ocean Diver", price: "4,500", series: "DIVER PRO" },
        { id: 10, name: "CS-M10 Heritage Gold", price: "3,895", series: "CLASSIC" },
        { id: 11, name: "CS-M11 Executive Slim", price: "2,999", series: "ELITE" },
        { id: 12, name: "CS-M12 Royal Apex", price: "3,890", series: "ROYAL" },
        { id: 13, name: "CS-M13 Chrono Master", price: "2,800", series: "CHRONOGRAPH" },
        { id: 14, name: "CS-M14 Vintage Soul", price: "4,900", series: "ANTIQUE" },
        { id: 15, name: "CS-M15 Phantom Dark", price: "4,740", series: "PHANTOM" }
    ];

    // 2. FULL DATA FOR 30 WOMEN'S WATCHES
    const womenData = [];
    const wSeries = ["Oyster Luxe", "Ceramic Elite", "Jewelry Line", "Rose Gold", "Minimalist"];
    for(let i=1; i<=30; i++) {
        womenData.push({
            id: i,
            name: "CS-Luxe Model " + (300 + i),
            series: wSeries[i % 5],
            price: (2500 + (i * 33)).toLocaleString()
        });
    }

    // 3. THE IMAGE FIXER FUNCTION
    function loadProducts(data, gridId, prefix) {
        const grid = document.getElementById(gridId);
        data.forEach(item => {
            // This format specifically matches GitHub's "Space and Brackets" format
            const imgPath = `${prefix}%20(${item.id}).jpg`;
            
            grid.innerHTML += `
                <div class="card">
                    <img src="${imgPath}" alt="${item.name}" onerror="this.src='${prefix}(${item.id}).jpg'">
                    <div class="info">
                        <p class="series">${item.series}</p>
                        <p class="name">${item.name}</p>
                        <div class="price">₹${item.price}</div>
                        <a href="payment.html" class="buy-btn">PAY SECURELY</a>
                    </div>
                </div>`;
        });
    }

    // Execute Loads
    loadProducts(mensData, 'mens-grid', 'watch1-jpg');
    loadProducts(womenData, 'women-grid', 'women-watch');
</script>
