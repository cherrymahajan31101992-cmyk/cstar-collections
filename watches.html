<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMEPIECES | CSTAR COLLECTIONS</title>
    <style>
        :root { --gold: #d4af37; --black: #050505; --gray: #121212; --white: #ffffff; }
        body { background: var(--black); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; scroll-behavior: smooth; }
        
        header { background: rgba(0,0,0,0.98); border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; padding: 15px 0; text-align: center;}
        .back-btn { position: absolute; left: 20px; top: 25px; color: var(--gold); text-decoration: none; font-size: 12px; border: 1px solid var(--gold); padding: 5px 10px; border-radius: 5px; }
        .logo { color: var(--gold); font-size: 1.8rem; font-weight: 800; letter-spacing: 5px; text-transform: uppercase; margin: 0 0 10px 0; }
        
        nav { display: flex; justify-content: center; gap: 25px; background: #000; padding: 10px 0; border-bottom: 1px solid #222; }
        nav a { color: #888; text-decoration: none; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }

        section { padding: 60px 5%; max-width: 1400px; margin: auto; }
        .section-title { text-align: center; margin-bottom: 40px; }
        .section-title h2 { color: var(--gold); font-size: 2rem; letter-spacing: 5px; text-transform: uppercase; border-bottom: 2px solid var(--gold); display: inline-block; padding-bottom: 10px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--gray); border-radius: 15px; border: 1px solid #222; overflow: hidden; transition: 0.5s; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--gold); transform: translateY(-10px); }
        .card img { width: 100%; height: 400px; object-fit: cover; background: #1a1a1a; }
        
        .info { padding: 20px; text-align: center; flex-grow: 1; }
        .series { color: var(--gold); font-size: 0.8rem; letter-spacing: 2px; font-weight: bold; text-transform: uppercase; }
        .name { color: #fff; font-size: 1rem; font-weight: bold; margin: 10px 0; }
        .price { font-size: 1.5rem; color: #fff; font-weight: 800; margin-bottom: 15px; }
        
        .buy-btn { display: block; background: #25D366; color: white; text-align: center; padding: 14px; text-decoration: none; border-radius: 8px; font-weight: bold; }
        footer { text-align: center; padding: 40px; color: #444; border-top: 1px solid #222; margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">← BACK</a>
    <p class="logo">CSTAR TIMEPIECES</p>
    <nav>
        <a href="#mens">Men's Premium</a>
        <a href="#women">Women's Elite</a>
    </nav>
</header>

<section id="mens">
    <div class="section-title"><h2>Men's Premium</h2></div>
    <div class="grid" id="mens-grid">
        </div>
</section>

<section id="women">
    <div class="section-title"><h2>Women's Elite</h2></div>
    <div class="grid" id="women-grid">
        </div>
</section>

<script>
    // MENS DATA (15 Products)
    const mensData = [
        { id: 1, name: "Model CS-W01 Aero", price: "2,999", series: "AERO SERIES" },
        { id: 2, name: "Model CS-W02 Stealth", price: "2,450", series: "STEALTH" },
        { id: 3, name: "Model CS-W03 Neon", price: "2,450", series: "NEON LINE" },
        { id: 4, name: "Model CS-W04 Black-Gold", price: "3,490", series: "CERAMIC" },
        { id: 5, name: "Model CS-W05 Pearl", price: "3,490", series: "PURE WHITE" },
        { id: 6, name: "Model CS-W06 Dual", price: "4,400", series: "TWO-TONE" },
        { id: 7, name: "Model CS-W07 Grand", price: "4,850", series: "GRAND TOURER" },
        { id: 8, name: "Model CS-W08 Bone", price: "3,200", series: "SKELETON" },
        { id: 9, name: "Model CS-W09 Diver", price: "4,500", series: "OCEAN PRO" },
        { id: 10, name: "Model CS-W10 Classic", price: "3,895", series: "HERITAGE" },
        { id: 11, name: "Model CS-W11 Executive", price: "2,999", series: "ELITE" },
        { id: 12, name: "Model CS-W12 Royal", price: "3,890", series: "APEX" },
        { id: 13, name: "Model CS-W13 Chrono", price: "2,800", series: "CHRONO LUX" },
        { id: 14, name: "Model CS-W14 Antique", price: "4,900", series: "VINTAGE" },
        { id: 15, name: "Model CS-W15 Phantom", price: "4,740", series: "PHANTOM" }
    ];

    // WOMENS DATA (10 Products)
    const womenData = [
        { id: 1, name: "CS-L01 Pearl Rose", price: "3,450", series: "Ceramic Elite" },
        { id: 2, name: "CS-L02 Silver Sunray", price: "2,850", series: "Oyster Luxe" },
        { id: 3, name: "CS-L03 Midnight Gold", price: "2,950", series: "Oyster Luxe" },
        { id: 4, name: "CS-L04 Champagne Duo", price: "2,750", series: "Two-Tone" },
        { id: 5, name: "CS-L05 Black Mesh", price: "2,550", series: "Minimalist" },
        { id: 6, name: "CS-L06 Golden Mesh", price: "2,600", series: "Minimalist" },
        { id: 7, name: "CS-L07 Bracelet Rose", price: "3,100", series: "Jewelry Line" },
        { id: 8, name: "CS-L08 Aqua Charm", price: "3,250", series: "Jewelry Line" },
        { id: 9, name: "CS-L09 Pure Crystal", price: "3,200", series: "Jewelry Line" },
        { id: 10, name: "CS-L10 Emerald Sky", price: "3,350", series: "Jewelry Line" }
    ];

    function loadGrid(data, containerId) {
        const container = document.getElementById(containerId);
        data.forEach(item => {
            // This line fixes the space issue in the file name automatically
            const fileName = `watch1-jpg (${item.id}).jpg`;
            container.innerHTML += `
                <div class="card">
                    <img src="${fileName}" alt="${item.name}">
                    <div class="info">
                        <p class="series">${item.series}</p>
                        <p class="name">${item.name}</p>
                        <div class="price">₹${item.price}</div>
                        <a href="payment.html" class="buy-btn">PAY SECURELY</a>
                    </div>
                </div>`;
        });
    }

    loadGrid(mensData, 'mens-grid');
    loadGrid(womenData, 'women-grid');
</script>

</body>
</html>
