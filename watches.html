<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMEPIECES | CSTAR COLLECTIONS</title>
    <style>
        :root { --gold: #d4af37; --black: #050505; --gray: #121212; --white: #ffffff; }
        body { background: var(--black); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; scroll-behavior: smooth; }
        header { background: rgba(0,0,0,0.98); border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; padding: 15px 0; text-align: center;}
        .back-btn { position: absolute; left: 20px; top: 25px; color: var(--gold); text-decoration: none; font-size: 12px; border: 1px solid var(--gold); padding: 5px 10px; border-radius: 5px; }
        .logo { color: var(--gold); font-size: 1.8rem; font-weight: 800; letter-spacing: 5px; text-transform: uppercase; margin: 0 0 10px 0; }
        nav { display: flex; justify-content: center; gap: 25px; background: #000; padding: 12px 0; border-bottom: 1px solid #222; }
        nav a { color: #888; text-decoration: none; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }
        section { padding: 60px 5%; max-width: 1400px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--gray); border-radius: 15px; border: 1px solid #222; overflow: hidden; transition: 0.5s; text-align: center; }
        .card img { width: 100%; height: 400px; object-fit: cover; background: #1a1a1a; }
        .info { padding: 25px; }
        .price { font-size: 1.7rem; color: #fff; font-weight: 800; margin-bottom: 20px; }
        .buy-btn { display: block; background: #25D366; color: white; text-align: center; padding: 15px; text-decoration: none; border-radius: 10px; font-weight: bold; }
        footer { text-align: center; padding: 60px; color: #444; border-top: 1px solid #222; margin-top: 50px; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">← HOME</a>
    <div class="logo">CSTAR TIMEPIECES</div>
    <nav><a href="#mens">Men's Premium</a><a href="#women">Women's Elite</a></nav>
</header>

<section id="mens"><h2 style="color:var(--gold); text-align:center; letter-spacing:5px;">MEN'S PREMIUM</h2><div class="grid" id="mens-grid"></div></section>
<section id="women"><h2 style="color:var(--gold); text-align:center; letter-spacing:5px;">WOMEN'S ELITE</h2><div class="grid" id="women-grid"></div></section>

<script>
    const mens = Array.from({length: 15}, (_, i) => ({ id: i + 1, name: "CS-M Model " + (10 + i), price: "3,450" }));
    const women = Array.from({length: 40}, (_, i) => ({ id: i + 1, name: "CS-Luxe Model " + (300 + i), price: "2,850" }));

    function loadGrid(data, gridId, prefix) {
        const grid = document.getElementById(gridId);
        data.forEach(item => {
            // We create the URL precisely: prefix + %20 + (id) + .jpg
            const mainPath = prefix + "%20(" + item.id + ").jpg";
            
            grid.innerHTML += `
                <div class="card">
                    <img src="${mainPath}" 
                         onerror="this.onerror=null; this.src='${prefix}%20(${item.id}).JPG'; this.setAttribute('onseconderror', 'this.src=\'${prefix}(${item.id}).jpg\'')"
                         alt="${item.name}">
                    <div class="info">
                        <p style="color:var(--gold); font-size:12px; font-weight:bold;">ELITE SERIES</p>
                        <h3 style="color:#fff; margin:10px 0;">${item.name}</h3>
                        <div class="price">₹${item.price}</div>
                        <a href="payment.html" class="buy-btn">PAY SECURELY</a>
                    </div>
                </div>`;
        });
    }

    loadGrid(mens, 'mens-grid', 'watch1-jpg');
    loadGrid(women, 'women-grid', 'women-watch');
</script>

<footer>&copy; 2026 CSTAR COLLECTIONS | SINCE 2014</footer>
</body>
</html>
