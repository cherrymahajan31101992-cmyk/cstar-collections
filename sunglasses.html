<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXURY EYEWEAR | CSTAR COLLECTIONS</title>
    <style>
        :root { --gold: #d4af37; --black: #050505; --gray: #121212; --white: #ffffff; }
        body { background: var(--black); color: var(--white); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; scroll-behavior: smooth; }
        
        /* Premium Header */
        header { background: #000; border-bottom: 2px solid var(--gold); padding: 25px; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.8); }
        .back-btn { position: absolute; left: 25px; top: 30px; color: var(--gold); text-decoration: none; font-weight: bold; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 5px; font-size: 12px; }
        .logo { color: var(--gold); font-size: 1.8rem; font-weight: 800; letter-spacing: 5px; text-transform: uppercase; }
        .sub-header { color: #888; font-size: 12px; letter-spacing: 2px; margin-top: 5px; }

        /* Product Grid */
        section { padding: 60px 5%; max-width: 1400px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; }
        .card { background: var(--gray); border-radius: 20px; border: 1px solid #222; overflow: hidden; transition: 0.5s ease; position: relative; }
        .card:hover { border-color: var(--gold); transform: translateY(-12px); box-shadow: 0 15px 35px rgba(212, 175, 55, 0.15); }
        
        /* "Original Box" Badge */
        .badge { position: absolute; top: 15px; right: 15px; background: var(--gold); color: black; padding: 5px 12px; font-size: 10px; font-weight: bold; border-radius: 5px; z-index: 10; text-transform: uppercase; }

        .card img { width: 100%; height: 320px; object-fit: cover; border-bottom: 1px solid #222; }
        
        .info { padding: 25px; text-align: center; }
        .brand-name { color: var(--gold); font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }
        .product-name { font-size: 1.3rem; font-weight: 700; margin-bottom: 12px; }
        .price { font-size: 1.8rem; font-weight: 800; margin-bottom: 15px; color: #fff; }
        .description { color: #777; font-size: 0.85rem; line-height: 1.6; margin-bottom: 20px; height: 50px; }
        
        .buy-btn { display: block; background: #25D366; color: white; text-align: center; padding: 16px; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .buy-btn:hover { background: #128C7E; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3); }

        footer { text-align: center; padding: 60px; color: #444; border-top: 1px solid #222; font-size: 12px; letter-spacing: 2px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">← RETURN</a>
    <div class="logo">CSTAR EYEWEAR</div>
    <div class="sub-header">MASTER QUALITY REPLICAS • ORIGINAL BOX INCLUDED</div>
</header>

<section>
    <div class="grid" id="eyewear-grid">
        <script>
            const grid = document.getElementById('eyewear-grid');
            
            // Define your brand names and detailed descriptions
            const brands = ["Ray-Ban", "Louis Vuitton", "Cartier", "Prada", "Gucci", "Dior", "Versace", "Tom Ford"];
            const styles = ["Classic Aviator", "Millionaire Edition", "Panthère Luxury", "Black Runway", "Double-G Frame", "Techno Shield", "Medusa Gold", "Executive Shade"];
            
            for (let i = 1; i <= 25; i++) {
                const randomBrand = brands[i % brands.length];
                const randomStyle = styles[i % styles.length];
                // Alternate prices between 1999 and 2499
                const finalPrice = (i % 2 === 0) ? "₹1,999" : "₹2,499";
                
                grid.innerHTML += `
                    <div class="card">
                        <div class="badge">FULL KIT BOX</div>
                        <img src="sun${i}.jpg" onerror="this.src='https://via.placeholder.com/400x320?text=SUN+${i}+IMAGE'">
                        <div class="info">
                            <p class="brand-name">${randomBrand}</p>
                            <p class="product-name">${randomStyle} #${i}</p>
                            <div class="price">${finalPrice}</div>
                            <p class="description">7A Master Quality. UV400 Protection. Includes Original Brand Hard Case, Cleaning Cloth & Certificate.</p>
                            <a href="https://wa.me/917696969628?text=Order+Sunglasses+Item+${i}+${randomBrand}" class="buy-btn">BUY VIA WHATSAPP</a>
                        </div>
                    </div>
                `;
            }
        </script>
    </div>
</section>

<footer>&copy; 2026 CSTAR COLLECTIONS | PREMIUM QUALITY GUARANTEED</footer>

</body>
</html>
