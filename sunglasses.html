<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSTAR LUXURY EYEWEAR</title>
    <style>
        :root { --gold: #d4af37; --black: #050505; --gray: #121212; --white: #ffffff; }
        body { background: var(--black); color: var(--white); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; scroll-behavior: smooth; }
        header { background: #000; border-bottom: 2px solid var(--gold); padding: 25px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .back-btn { position: absolute; left: 25px; top: 30px; color: var(--gold); text-decoration: none; font-weight: bold; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 5px; font-size: 12px; }
        .logo { color: var(--gold); font-size: 1.8rem; font-weight: 800; letter-spacing: 5px; text-transform: uppercase; margin: 0; }
        section { padding: 60px 5%; max-width: 1400px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; }
        .card { background: var(--gray); border-radius: 20px; border: 1px solid #222; overflow: hidden; transition: 0.5s ease; position: relative; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--gold); transform: translateY(-12px); box-shadow: 0 15px 35px rgba(212, 175, 55, 0.3); }
        .badge { position: absolute; top: 15px; right: 15px; background: var(--gold); color: black; padding: 5px 12px; font-size: 10px; font-weight: bold; border-radius: 5px; z-index: 10; }
        .card img { width: 100%; height: 320px; object-fit: cover; border-bottom: 1px solid #222; background: #1a1a1a; }
        .info { padding: 25px; text-align: center; flex-grow: 1; }
        .brand { color: var(--gold); font-size: 1.1rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        .price { font-size: 1.8rem; margin: 15px 0; font-weight: 800; color: #fff; }
        .desc { color: #777; font-size: 0.85rem; margin-bottom: 20px; line-height: 1.4; }
        .buy-btn { display: block; background: #25D366; color: white; text-align: center; padding: 16px; text-decoration: none; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        footer { text-align: center; padding: 40px; color: #444; border-top: 1px solid #222; margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">← HOME</a>
    <p class="logo">CSTAR EYEWEAR</p>
</header>

<section>
    <div class="grid" id="glass-grid">
        <script>
            const grid = document.getElementById('glass-grid');
            const brands = ["Ray-Ban", "Louis Vuitton", "Gucci", "Cartier", "Prada", "Dior"];
            
            for (let i = 1; i <= 25; i++) {
                const currentBrand = brands[i % brands.length];
                const price = (i % 2 === 0) ? "₹1,999" : "₹2,499";
                
                // This link tries the "name (1).jpg" format which works for your watches
                // It handles both .jpg and .JPG automatically
                const fileUrl = `sun%20(${i}).jpg`;
                const altFileUrl = `sun%20(${i}).JPG`;

                grid.innerHTML += `
                    <div class="card">
                        <div class="badge">ORIGINAL BOX</div>
                        <img src="${fileUrl}" onerror="this.src='${altFileUrl}'; this.onerror=function(){this.src='https://via.placeholder.com/400x320?text=Upload+sun+(${i}).jpg'}">
                        <div class="info">
                            <p class="brand">${currentBrand}</p>
                            <div class="price">${price}</div>
                            <p class="desc">Master Quality Premium Copy. Includes Original Hard Case & Kit.</p>
                            <a href="https://wa.me/917696969628?text=Order+Sunglasses+Item+${i}" class="buy-btn">ORDER ON WHATSAPP</a>
                        </div>
                    </div>
                `;
            }
        </script>
    </div>
</section>

<footer>&copy; 2026 CSTAR COLLECTIONS</footer>

</body>
</html>
