<section>
    <div class="grid" id="glass-grid">
        <script>
            const grid = document.getElementById('glass-grid');
            
            // SETTINGS: Change these to match your setup
            const totalPhotos = 25; 
            const price = "₹1,999"; 

            for (let i = 1; i <= totalPhotos; i++) {
                // Change the line below to match your filename!
                // If named "sun1.jpg", use: "sun" + i + ".jpg"
                // If named "sun (1).jpg", use: "sun%20(" + i + ").jpg"
                
                let fileName = "sun" + i + ".jpg"; 

                grid.innerHTML += `
                    <div class="card">
                        <img src="${fileName}" onerror="this.src='https://via.placeholder.com/400x300?text=Photo+Missing:+${fileName}'">
                        <div class="info">
                            <p class="name">Luxury Sunglasses #${i}</p>
                            <div class="price">${price}</div>
                            <a href="https://wa.me/917696969628?text=I+want+to+buy+Sunglasses+Item+${i}" class="buy-btn">ORDER ON WHATSAPP</a>
                        </div>
                    </div>
                `;
            }
        </script>
    </div>
</section>
