<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE CHECKOUT | CSTAR</title>
    <style>
        :root { --gold: #d4af37; --black: #050505; --white: #ffffff; }
        body { background: var(--black); color: var(--white); font-family: 'Segoe UI', sans-serif; text-align: center; padding: 40px 20px; margin: 0; }
        
        .pay-container { max-width: 450px; margin: auto; background: #121212; padding: 40px 20px; border: 2px solid var(--gold); border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.9); }
        .logo { color: var(--gold); font-size: 1.8rem; font-weight: 800; letter-spacing: 4px; margin-bottom: 10px; }
        .tagline { color: #888; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; }
        
        /* QR Code Styling */
        .qr-box { background: white; padding: 15px; border-radius: 15px; display: inline-block; margin-bottom: 25px; }
        .qr-box img { width: 250px; height: 250px; display: block; border-radius: 5px; }
        
        .amount-alert { color: var(--gold); font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }
        .instruction { color: #aaa; font-size: 14px; margin-bottom: 5px; }
        
        .upi-id { background: #1a1a1a; padding: 15px; border-radius: 10px; color: #fff; font-weight: bold; margin: 15px 0; border: 1px dashed var(--gold); font-size: 1.1rem; letter-spacing: 1px; }
        
        .whatsapp-notice { background: rgba(37, 211, 102, 0.1); border: 1px solid #25D366; padding: 15px; border-radius: 10px; color: #25D366; font-size: 13px; margin-bottom: 25px; line-height: 1.4; }
        
        .done-btn { display: block; background: #25D366; color: white; padding: 18px; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .done-btn:hover { background: #1ebd5b; transform: translateY(-3px); }
    </style>
</head>
<body>

<div class="pay-container">
    <div class="logo">CSTAR PAY</div>
    <div class="tagline">Secure Checkout Portal</div>

    <p class="amount-alert">Scan to Pay via UPI</p>
    
    <div class="qr-box">
        <img src="myqr.png" onerror="this.src='myqr.jpg'; this.onerror=function(){this.parentElement.innerHTML='<p style=color:black;font-weight:bold;padding:50px 0;>QR IMAGE MISSING<br>Please check filename</p>'}">
    </div>

    <p class="instruction">Manual UPI ID:</p>
    <div class="upi-id">7696969628@ybl</div>

    <div class="whatsapp-notice">
        <strong>IMPORTANT:</strong> After successful payment, take a screenshot and click the button below to send it to us for order processing.
    </div>
    
    <a href="https://wa.me/917696969628?text=Hello+CSTAR+I+have+completed+the+payment.+Here+is+my+screenshot." class="done-btn">I HAVE PAID • SEND SCREENSHOT</a>
</div>

<p style="margin-top: 30px; color: #444; font-size: 12px;">© 2026 CSTAR COLLECTIONS | SSL ENCRYPTED</p>

</body>
</html>
