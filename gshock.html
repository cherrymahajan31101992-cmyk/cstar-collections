<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-SHOCK COLLECTION | CSTAR</title>
    <style>
        :root { --gold: #d4af37; --black: #050505; --gray: #121212; --white: #ffffff; }
        body { background: var(--black); color: var(--white); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; }
        
        header { background: #000; border-bottom: 2px solid var(--gold); padding: 20px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .back-btn { position: absolute; left: 20px; top: 25px; color: var(--gold); text-decoration: none; font-weight: bold; }
        .logo { color: var(--gold); font-size: 1.5rem; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; }

        section { padding: 60px 5%; max-width: 1400px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--gray); border-radius: 15px; border: 1px solid #222; overflow: hidden; transition: 0.4s; }
        .card:hover { border-color: var(--gold); transform: translateY(-10px); }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        
        .info { padding: 20px; text-align: center; }
        .name { color: var(--gold); font-size: 1.1rem; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        .price { font-size: 1.6rem; font-weight: 800; margin-bottom: 20px; }
        
        .buy-btn { display: block; background: #25D366; color: white; text-align: center; padding: 15px; text-decoration: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">← BACK</a>
    <div class="logo">G-SHOCK PREMIUM</div>
</header>

<section>
    <div class="grid">
        <div class="card">
            <img src="watch1-jpg%20(2).jpg">
            <div class="info">
                <p class="name">G-Shock Casioak Silver Metal</p>
                <div class="price">₹2,450</div>
                <a href="https://wa.me/917696969628?text=Order+GShock+Silver" class="buy-btn">ORDER ON WHATSAPP</a>
            </div>
        </div>

        <div class="card">
            <img src="watch1-jpg%20(3).jpg">
            <div class="info">
                <p class="name">G-Shock Neon Limited Edition</p>
                <div class="price">₹2,450</div>
                <a href="https://wa.me/917696969628?text=Order+GShock+Neon" class="buy-btn">ORDER ON WHATSAPP</a>
            </div>
        </div>
        
        </div>
</section>

</body>
</html>
