<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSTAR COLLECTIONS | Luxury Mall</title>
    <style>
        :root { --gold: #d4af37; --black: #050505; --gray: #121212; --white: #ffffff; }
        body { background: var(--black); color: var(--white); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; scroll-behavior: smooth; }
        
        /* Navigation Bar */
        nav { background: rgba(0,0,0,0.95); padding: 15px 5%; position: sticky; top: 0; border-bottom: 1px solid var(--gold); z-index: 1000; display: flex; justify-content: center; gap: 20px; backdrop-filter: blur(10px); flex-wrap: wrap; }
        .nav-item { position: relative; }
        .nav-item a { color: var(--gold); text-decoration: none; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; padding: 10px; font-size: 13px; }
        .dropdown { display: none; position: absolute; background: var(--gray); min-width: 180px; border: 1px solid var(--gold); top: 35px; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .nav-item:hover .dropdown { display: block; }
        .dropdown a { color: white; padding: 12px 16px; display: block; font-size: 12px; border-bottom: 1px solid #222; text-decoration: none; }
        .dropdown a:hover { background: #222; color: var(--gold); }

        /* Sections */
        section { padding: 80px 5%; border-bottom: 1px solid #222; max-width: 1300px; margin: auto; }
        .cat-title { text-align: center; margin-bottom: 50px; }
        .cat-title h2 { color: var(--gold); font-size: 2.5rem; letter-spacing: 5px; text-transform: uppercase; margin: 0; }
        .cat-title p { color: #666; letter-spacing: 2px; margin-top: 10px; }

        /* Product Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--gray); border-radius: 20px; border: 1px solid #222; overflow: hidden; transition: 0.4s ease; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--gold); transform: translateY(-10px); box-shadow: 0 15px 35px rgba(212, 175, 55, 0.15); }
        .card img { width: 100%; height: 380px; object-fit: cover; }
        
        .info { padding: 25px; flex-grow: 1; }
        .name { color: var(--gold); font-size: 1.2rem; font-weight: bold; margin: 0; text-transform: uppercase; }
        .price { font-size: 1.7rem; margin: 15px 0; font-weight: 800; color: #fff; }
        .size-tag { background: #333; color: var(--gold); padding: 3px 10px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        .desc { color: #888; font-size: 0.9rem; line-height: 1.5; margin-bottom: 20px; }
        
        /* Buttons */
        .buy-btn { display: block; background: #25D366; color: white; text-align: center; padding: 15px; text-decoration: none; border-radius: 12px; font-weight: bold; transition: 0.3s; }
        .buy-btn:hover { background: #128C7E; transform: scale(1.03); }

        /* Floating Help Chat */
        .help-chat { position: fixed; bottom: 30px; right: 30px; z-index: 10000; display: flex; align-items: center; text-decoration: none; }
        .help-label { background: white; color: black; padding: 8px 15px; border-radius: 20px; margin-right: 10px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-size: 14px; }
        .help-icon { background: #25D366; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4); }

        footer { text-align: center; padding: 60px; color: #444; border-top: 1px solid #222; margin-top: 50px; }
    </style>
</head>
