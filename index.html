<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSTAR COLLECTIONS | Premium Watches</title>
    <style>
        :root { --gold: #d4af37; --black: #000; --gray: #111; }
        body { background: var(--black); color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }
        
        nav { background: #000; padding: 20px; position: sticky; top: 0; border-bottom: 1px solid var(--gold); z-index: 1000; text-align: center; }
        nav a { color: var(--gold); text-decoration: none; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }

        .container { padding: 40px 10%; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        
        .product-card { background: var(--gray); border-radius: 15px; border: 1px solid #333; overflow: hidden; transition: 0.3s; }
        .product-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .product-card img { width: 100%; height: 300px; object-fit: cover; }
        
        .details { padding: 20px; }
        .name { color: var(--gold); font-size: 1.3rem; font-weight: bold; margin: 0; }
        .price { font-size: 1.5rem; margin: 10px 0; font-weight: 800; }
        .desc { color: #888; font-size: 0.85rem; line-height: 1.5; height: 60px; overflow: hidden; }
        
        .buy-btn { display: block; background: #25D366; color: white; text-align: center; padding: 12px; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<nav><a href="#">CSTAR COLLECTIONS</a></nav>

<div class="container">

    <div class="product-card">
        <img src="watch1-jpg" alt="Watch 1">
        <div class="details">
            <p class="name">Diesel Mega Chief Black</p>
            <p class="desc">7A Master Quality. Chronograph Working. Premium Stainless Steel Chain with Matte Finish.</p>
            <div class="price">₹3,499</div>
            <a href="https://wa.me/917696969628?text=I+want+to+order+Diesel+Mega+Chief" class="buy-btn">Order on WhatsApp</a>
        </div>
    </div>

    <div class="product-card">
    <img src="watch2-jpg" alt="Watch 2">
    <div class="details">
        <p class="name">Rolex</p>
        <p class="desc">WRITE YOUR DESCRIPTION HERE. (Example: 7A Quality, Leather Strap, etc.)</p>
        <div class="price">₹39,00</div>
        <a href="https://wa.me/91XXXXXXXXXX?text=I+want+to+order+the+NEW+WATCH" class="buy-btn">Order on WhatsApp</a>
    </div>
</div>

</div>

</body>
</html>
