<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSTAR COLLECTIONS | Luxury Boutique</title>
    <style>
        :root { --gold: #d4af37; --black: #050505; --gray: #121212; --white: #ffffff; }
        body { background: var(--black); color: var(--white); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; }
        
        header { background: rgba(0,0,0,0.98); border-bottom: 2px solid var(--gold); padding: 25px 0; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .logo-wrapper { display: inline-block; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4)); }

        nav { display: flex; justify-content: center; gap: 40px; padding-top: 20px; }
        nav a { color: var(--white); text-decoration: none; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; font-size: 14px; transition: 0.3s; }
        nav a:hover { color: var(--gold); }

        /* Banner */
        .hero { height: 60vh; display: flex; align-items: center; justify-content: center; text-align: center; border-bottom: 1px solid #222; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('watch1-jpg%20(7).jpg'); background-size: cover; background-position: center; }
        .hero h1 { font-size: 3rem; letter-spacing: 10px; color: var(--gold); text-transform: uppercase; }

        /* Category Grid on Home */
        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 60px 5%; }
        .cat-card { background: var(--gray); border: 1px solid #222; border-radius: 15px; overflow: hidden; text-align: center; transition: 0.4s; text-decoration: none; }
        .cat-card:hover { border-color: var(--gold); transform: translateY(-10px); }
        .cat-card img { width: 100%; height: 400px; object-fit: cover; }
        .cat-card h3 { color: var(--gold); padding: 20px; font-size: 1.5rem; margin: 0; text-transform: uppercase; letter-spacing: 4px; }

        footer { text-align: center; padding: 50px; color: #444; border-top: 1px solid #222; }
    </style>
</head>
<body>

<header>
    <div class="logo-wrapper">
        <svg width="220" height="70" viewBox="0 0 220 70">
            <text x="30" y="42" fill="#d4af37" font-family="Arial, sans-serif" font-size="28" font-weight="bold" letter-spacing="2">CSTAR</text>
            <text x="30" y="60" fill="#888" font-family="Arial, sans-serif" font-size="10" letter-spacing="5">COLLECTIONS</text>
        </svg>
    </div>
    <nav>
        <a href="watches.html">Watches</a>
        <a href="footwear.html">Footwear</a>
        <a href="sunglasses.html">Eyewear</a>
    </nav>
</header>

<div class="hero">
    <h1>PRIVATE LUXURY</h1>
</div>

<div class="category-grid">
    <a href="watches.html" class="cat-card">
        <img src="watch1-jpg%20(1).jpg">
        <h3>Timepieces</h3>
    </a>
    <a href="footwear.html" class="cat-card">
        <img src="formal1-jpg%20(1).jpg">
        <h3>Footwear</h3>
    </a>
    <a href="sunglasses.html" class="cat-card">
        <img src="sun1-jpg(1).jpg">
        <h3>Sunglasses</h3>
    </a>
</div>

<footer>&copy; 2026 CSTAR COLLECTIONS</footer>

</body>
</html>
