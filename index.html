<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSTAR COLLECTIONS | Elite Boutique</title>
    <style>
        :root { --gold: #d4af37; --black: #050505; --gray: #121212; --white: #ffffff; }
        body { background: var(--black); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; scroll-behavior: smooth; }
        
        /* 1. FIXED HEADER & CATEGORIES */
        header { background: rgba(0,0,0,0.98); border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; padding: 15px 0; }
        .logo-wrapper { text-align: center; margin-bottom: 15px; filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.3)); }
        
        nav { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        nav a { color: var(--white); text-decoration: none; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; font-size: 13px; transition: 0.3s; }
        nav a:hover { color: var(--gold); }

        /* 2. PRODUCT GRID */
        section { padding: 60px 5%; max-width: 1500px; margin: auto; }
        .cat-title { text-align: center; margin-bottom: 40px; color: var(--gold); text-transform: uppercase; letter-spacing: 5px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--gray); border-radius: 15px; border: 1px solid #222; overflow: hidden; transition: 0.5s; text-align: center; }
        .card:hover { border-color: var(--gold); transform: translateY(-10px); }
        .card img { width: 100%; height: 380px; object-fit: cover; }
        .info { padding: 20px; }
        .price { font-size: 1.6rem; margin: 10px 0; font-weight: 800; color: #fff; }
        .buy-btn { display: block; background: var(--gold); color: #000; padding: 15px; text-decoration: none; border-radius: 8px; font-weight: bold; }

        /* 3. FLOATING SUPPORT BUTTON */
        .support-btn { position: fixed; bottom: 30px; right: 30px; background: #25D366; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 9999; }
        
        footer { text-align: center; padding: 40px; color: #444; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <div class="logo-wrapper">
        <svg width="200" height="60" viewBox="0 0 220 70">
            <text x="30" y="45" fill="#d4af37" font-family="Arial" font-size="32" font-weight="bold">CSTAR</text>
        </svg>
    </div>
    <nav>
        <a href="watches.html">Watches</a>
        <a href="footwear.html">Footwear</a>
        <a href="sunglasses.html">Eyewear</a>
        <a href="payment.html">Payments</a>
    </nav>
</header>

<section id="main-collection">
    <h2 class="cat-title">Elite Collection</h2>
    <div class="grid">
        <div class="card">
            <img src="watch1-jpg%20(7).jpg">
            <div class="info">
                <h3>Model CS-W07</h3>
                <div class="price">₹4,850</div>
                <a href="payment.html" class="buy-btn">PAY SECURELY</a>
            </div>
        </div>
        </div>
</section>

</body>
</html>
